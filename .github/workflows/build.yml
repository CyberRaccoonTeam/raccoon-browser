name: Build Raccoon Browser

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  FIREFOX_VERSION: "148.0.2"

jobs:
  build:
    name: Build on Ubuntu Linux
    runs-on: ubuntu-22.04
    timeout-minutes: 180
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 1

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            python3 \
            python3-pip \
            mercurial \
            rustc \
            cargo \
            libgtk-3-dev \
            libdbus-1-dev \
            libglib2.0-dev \
            libxt-dev \
            libasound2-dev \
            libpulse-dev \
            libevent-dev \
            libpixman-1-dev \
            libdrm-dev \
            libgbm-dev \
            libegl1-mesa-dev \
            libgles2-mesa-dev \
            wget \
            curl \
            xz-utils
          
          # Install Python packages needed for Firefox build
          pip3 install --user zstandard
        timeout-minutes: 30

      - name: Setup swap space (prevent OOM)
        run: |
          # Remove existing swap if any
          sudo swapoff -a 2>/dev/null || true
          sudo rm -f /swapfile
          
          # Create new swap
          sudo fallocate -l 8G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h

      - name: Download Firefox source
        run: |
          echo "🦝 Downloading Firefox ${FIREFOX_VERSION} source..."
          curl -L "https://archive.mozilla.org/pub/firefox/releases/${FIREFOX_VERSION}/source/firefox-${FIREFOX_VERSION}.source.tar.xz" -o firefox-source.tar.xz
          
          # Extract to firefox-source directory
          mkdir -p firefox-source
          tar -xf firefox-source.tar.xz -C firefox-source --strip-components=1
          rm firefox-source.tar.xz
          
          echo "✅ Firefox source downloaded"
          ls -la firefox-source/ | head -20
        timeout-minutes: 30

      - name: Apply Raccoon branding
        run: |
          echo "🦝 Applying Raccoon branding..."
          cd firefox-source
          mkdir -p browser/branding/raccoon
          
          # Copy branding from fork if available
          if [ -d "../raccoon-browser-fork/librewolf-source/browser/branding" ]; then
            cp -r ../raccoon-browser-fork/librewolf-source/browser/branding/* browser/branding/raccoon/ 2>/dev/null || true
            echo "✅ Branding files copied from fork"
          else
            echo "⚠️ Creating minimal branding..."
            mkdir -p browser/branding/raccoon/content
            echo "Raccoon Browser" > browser/branding/raccoon/brand.properties
          fi
          
          # Apply mozconfig
          if [ -f "../mozconfig.example" ]; then
            cp ../mozconfig.example mozconfig
            echo "✅ mozconfig applied"
          fi

      - name: Build Firefox
        run: |
          echo "🦝 Building Raccoon Browser (this takes 1-3 hours)..."
          cd firefox-source
          
          # Bootstrap toolchain (downloads clang 17+)
          echo "🔧 Bootstrapping toolchain..."
          yes | ./mach bootstrap --application browser
          
          # Create mozconfig for build
          cat > mozconfig << 'EOF'
          # Raccoon Browser mozconfig
          ac_add_options --branding=browser/branding/raccoon
          ac_add_options --enable-release
          ac_add_options --enable-optimize
          
          # Privacy features
          ac_add_options --disable-crashreporter
          ac_add_options --disable-necko-wifi
          
          # Build configuration
          mk_add_options MOZ_OBJDIR=@TOPSRCDIR@/obj-@CONFIG_GUESS@
          mk_add_options MOZ_MAKE_FLAGS="-j$(nproc)"
          EOF
          
          # Build
          ./mach build --jobs $(nproc)
          
          echo "✅ Build complete!"
        timeout-minutes: 150

      - name: Package binary
        run: |
          echo "📦 Packaging Raccoon Browser..."
          cd firefox-source
          
          # Find the build output directory
          BUILD_DIR=$(find obj-* -type d -maxdepth 1 2>/dev/null | head -1)
          
          if [ -z "$BUILD_DIR" ]; then
            echo "❌ Build directory not found!"
            exit 1
          fi
          
          echo "Build directory: $BUILD_DIR"
          
          # Create tarball of the browser
          mkdir -p ../dist
          tar -czf ../raccoon-browser-linux-x64.tar.gz -C "$BUILD_DIR/dist" bin
      
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: raccoon-browser-linux-x64
          path: raccoon-browser-linux-x64.tar.gz
          retention-days: 14
          compression-level: 6

      - name: Upload to GitHub Releases (if tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: raccoon-browser-linux-x64.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
