name: Release Raccoon Browser

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags (v1.0.0, v1.0.0-test, etc.)

env:
  FIREFOX_VERSION: "148.0.2"

jobs:
  build-release:
    name: Build Release Binary
    runs-on: ubuntu-22.04
    timeout-minutes: 180
    permissions:
      contents: write  # Required for creating releases
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 1

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            python3 \
            python3-pip \
            mercurial \
            rustc \
            cargo \
            libgtk-3-dev \
            libdbus-1-dev \
            libglib2.0-dev \
            libxt-dev \
            libasound2-dev \
            libpulse-dev \
            libevent-dev \
            libpixman-1-dev \
            libdrm-dev \
            libgbm-dev \
            libegl1-mesa-dev \
            libgles2-mesa-dev \
            wget \
            curl \
            xz-utils \
            jq
        timeout-minutes: 30

      - name: Setup swap space (prevent OOM)
        run: |
          # Remove existing swap if any
          sudo swapoff -a 2>/dev/null || true
          sudo rm -f /swapfile
          
          # Create new swap
          sudo fallocate -l 8G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h

      - name: Download Firefox source
        run: |
          echo "🦝 Downloading Firefox ${FIREFOX_VERSION} source..."
          mkdir -p firefox-source
          cd firefox-source
          curl -L "https://archive.mozilla.org/pub/firefox/releases/${FIREFOX_VERSION}/source/firefox-${FIREFOX_VERSION}.source.tar.xz" -o firefox-source.tar.xz
          tar -xf firefox-source.tar.xz
          rm firefox-source.tar.xz
          echo "✅ Firefox source downloaded ($(du -sh . | cut -f1))"
        timeout-minutes: 30

      - name: Apply Raccoon branding
        run: |
          echo "🦝 Applying Raccoon branding..."
          cd firefox-source
          mkdir -p browser/branding/raccoon
          
          # Copy branding from fork if available
          if [ -d "../raccoon-browser-fork/librewolf-source/browser/branding" ]; then
            cp -r ../raccoon-browser-fork/librewolf-source/browser/branding/* browser/branding/raccoon/ 2>/dev/null || true
            echo "✅ Branding files copied from fork"
          else
            echo "⚠️ Creating minimal branding..."
            mkdir -p browser/branding/raccoon/content
            echo "Raccoon Browser" > browser/branding/raccoon/brand.properties
          fi
          
          # Apply mozconfig
          if [ -f "../mozconfig.example" ]; then
            cp ../mozconfig.example mozconfig
            echo "✅ mozconfig applied"
          fi

      - name: Build Firefox
        run: |
          echo "🦝 Building Raccoon Browser (this takes 1-3 hours)..."
          cd firefox-source
          
          # Configure build
          ./mach configure
          
          # Build with parallel jobs
          ./mach build --jobs $(nproc)
          
          echo "✅ Build complete!"
        timeout-minutes: 150
        env:
          MACH_USE_SYSTEM_PYTHON: "1"

      - name: Package binary
        id: package
        run: |
          echo "📦 Packaging Raccoon Browser..."
          cd firefox-source
          
          # Find the build output directory
          BUILD_DIR=$(find obj-* -type d -maxdepth 1 2>/dev/null | head -1)
          
          if [ -z "$BUILD_DIR" ]; then
            echo "❌ Build directory not found!"
            exit 1
          fi
          
          echo "Build directory: $BUILD_DIR"
          
          # Create tarball
          mkdir -p ../dist
          tar -czf ../raccoon-browser-linux-x64.tar.gz -C "$BUILD_DIR/dist" bin
          
          # Get file size
          FILE_SIZE=$(du -h ../raccoon-browser-linux-x64.tar.gz | cut -f1)
          FILE_BYTES=$(stat -c%s ../raccoon-browser-linux-x64.tar.gz)
          
          echo "📦 Package size: $FILE_SIZE"
          echo "file_size=$FILE_SIZE" >> $GITHUB_OUTPUT
          echo "file_bytes=$FILE_BYTES" >> $GITHUB_OUTPUT
          
          # Verify size is under 2GB
          if [ $FILE_BYTES -gt 2147483648 ]; then
            echo "❌ Package exceeds 2GB limit!"
            exit 1
          fi

      - name: Generate release notes
        id: release_notes
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          cat > release_notes.md << EOF
          # 🦝 Raccoon Browser ${VERSION}
          
          ## What's New
          
          Pre-built binary for Linux (x64). Built from Firefox ${FIREFOX_VERSION} source with Raccoon branding.
          
          ## Installation
          
          \`\`\`bash
          # Download and extract
          tar -xzf raccoon-browser-linux-x64.tar.gz
          
          # Run the browser
          ./bin/raccoon-browser
          \`\`\`
          
          ## System Requirements
          
          - Linux (Ubuntu/Debian recommended)
          - 8GB+ RAM (16GB recommended)
          - 4+ CPU cores
          - GTK3 dependencies
          
          ## Build Details
          
          - **Firefox Version:** ${FIREFOX_VERSION}
          - **Build Time:** ~1-3 hours
          - **Package Size:** ${{ steps.package.outputs.file_size }}
          - **Platform:** Linux x64
          
          ## Known Issues
          
          - First launch may be slow (profile initialization)
          - Some system themes may not apply correctly
          
          ---
          
          *Built with 🦝 by Cyber & Raccoon*
          EOF
          
          echo "✅ Release notes generated"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: raccoon-browser-linux-x64.tar.gz
          body_path: release_notes.md
          generate_release_notes: false
          draft: false
          prerelease: ${{ contains(github.ref, '-test') || contains(github.ref, '-alpha') || contains(github.ref, '-beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifact (for manual download)
        uses: actions/upload-artifact@v4
        with:
          name: raccoon-browser-${{ github.ref_name }}-linux-x64
          path: raccoon-browser-linux-x64.tar.gz
          retention-days: 30
          compression-level: 6
